version: '3.9'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: assetflow
      POSTGRES_PASSWORD: assetflow123
      POSTGRES_DB: assetflow_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assetflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
